spring:
  application:
    name: fintech-banking

  datasource:
    url: jdbc:postgresql://localhost:5432/banking
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mail:
    username: ${EMAIL_USER}
    password: ${EMAIL_PASSWORD}
    host: smtp.gmail.com
    port: 587
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  web:
    error:
      whitelabel:
        enabled: true

server:
  port: 8899

app:
  base-url: http://localhost:8899

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000